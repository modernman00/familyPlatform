name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-quality:
    name: PHP Code Quality & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, curl

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run PHPStan (Static Analysis)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Run Psalm (Type Checking)
        run: vendor/bin/psalm --no-cache

      # Note: We run PHP-CS-Fixer in dry-run mode so it fails the build if code is messy, 
      # forcing developers to fix it locally rather than auto-committing in CI.
      - name: Check Code Styling (PHP-CS-Fixer)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  frontend-build:
    name: Frontend Asset Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # or match your local version
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Verify Production Build
        run: npm run prod
